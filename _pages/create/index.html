---
layout: default
title: Submit a Post
permalink: /create/
location: 'footer'
footer_section: 'Creators'
---

<div class="create-page" id="content-area" style="display: none">
    <section class="create-header">
        <span class="category-pill">Creator</span>
        <h1 class="main-headline">Submit a Post</h1>
        <p class="main-excerpt">Write your ideas in Markdown and submit them as a pull request to the Zunalita posts repository.</p>
    </section>

    <div class="create-grid">
        <form class="form-card" id="create-form" onsubmit="return false;">
            <div class="field-group">
                <label for="title">Post title</label>
                <input id="title" class="search-input" type="text" placeholder="Post title..." />
            </div>

            <div class="field-group">
                <label for="tags">Tags <span class="field-note">(at least 3 tags, comma-separated)</span></label>
                <input id="tags" class="search-input" type="text" placeholder="e.g. tech, news, discord" />
            </div>

            <div class="field-group">
                <label for="image">Cover image URL</label>
                <input id="image" class="search-input" type="url" placeholder="https://example.com/image.jpg" />
            </div>

            <div class="field-group">
                <label for="image_alt">Image alt text</label>
                <input id="image_alt" class="search-input" type="text" placeholder="A short description of the image" />
            </div>

            <div class="field-group">
                <label for="content">Your content</label>
                <textarea id="content" class="search-input" placeholder="Write your content, be creative! Also, we prefer posts in markdown..."></textarea>
                <div id="charcount" class="charcount">0 / 300</div>
            </div>

            <label class="checkbox-field">
                <input type="checkbox" id="agreement" />
                <span>I agree to the <a href="/terms" target="_blank" rel="noopener noreferrer">Terms of Service</a></span>
            </label>

            <div class="form-actions">
                <button id="submitBtn" class="primary-button" type="button">Submit post</button>
                <div id="status" class="status-message"></div>
            </div>

            <p id="save-status-text" class="save-status">Draft is going to be saved locally as you type.</p>
        </form>

        <aside class="preview-card">
            <h2>Preview</h2>
            <div id="preview" aria-live="polite" aria-atomic="true"></div>
        </aside>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="{{ '/assets/js/login/login.js' | relative_url }}"></script>
<script type="module" src="{{ '/assets/js/create/create.js' | relative_url }}"></script>
