---
layout: default
title: Search
list_title: Results
permalink: /search/
location: 'header'
---

<div class="search-page" style="max-width: 740px; margin: 40px auto;">
    {%- if page.title -%}
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
    </header>
    {%- endif -%}

    <div class="search-container" style="margin-bottom: 32px;">
        <input
            type="text"
            id="search-box"
            class="search-input"
            placeholder="Type your query..."
            autocomplete="off"
        />
    </div>

    <ul class="latest-list" id="search-results">
        <li style="color: var(--muted); padding: 20px 0; text-align: center;">What are you curious about today? Type a keyword to explore.</li>
    </ul>

    <script src="{{ '/assets/js/search/lunr.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/search/search.js' | relative_url }}"></script>
</div>
