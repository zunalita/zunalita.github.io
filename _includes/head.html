<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' -%}
    <!-- 
     Any user can opt-out from analytics in our website by visiting: 
     https://zunalita.github.io/privacy/choices/
    -->

    <!-- Load analytics -->
    <script defer src="{{ '/assets/js/analytics/analytics.js' | relative_url }}"></script>
  {%- endif -%}
  <script>
    document.addEventListener('error', function (event) {
      if (event.target.tagName.toLowerCase() === 'img') {
        event.target.style.display = 'none';
        const parent = event.target.closest('.latest-thumb, .post-hero-image, .overlay-card-img');
        if (parent) parent.style.display = 'none';
      }
    }, true);
  </script>
</head>
